# ──────────────────────────────────────────────
# docker-compose.yml for Squad-1 POS System (Next.js)
# ──────────────────────────────────────────────
# Run with:  docker compose up --build
# Stop with: docker compose down

services:
  web:
    # Build using the Dockerfile in the current directory
    build: .

    # Map container port 3000 → your machine's port 3000
    # Access the app at http://localhost:3000
    ports:
      - "3000:3000"

    # VOLUMES — mount your local code into the container
    # so changes you make locally auto-refresh in the browser
    volumes:
      - .:/app # Sync your project folder → /app in container
      - /app/node_modules # BUT keep container's node_modules
      - /app/.next # Keep container's .next build cache

    # ENVIRONMENT VARIABLES
    env_file:
      - .env

    environment:
      - WATCHPACK_POLLING=true # Enables file-watching in Docker (for hot-reload)
